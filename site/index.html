<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ffocr model hosting</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f5f7;
        color: #171717;
      }

      main {
        width: min(760px, calc(100vw - 32px));
        padding: 32px;
        border-radius: 24px;
        background: white;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      }

      code {
        padding: 2px 6px;
        border-radius: 8px;
        background: #f1f5f9;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ffocr model hosting</h1>
      <p>This GitHub Pages site hosts static model files for the <code>ffocr</code> package.</p>
      <p>Expected model base URL:</p>
      <p><code>/models/pp-ocrv5</code></p>
    </main>
  </body>
</html>
