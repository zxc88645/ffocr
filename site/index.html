<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ffocr</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(255, 214, 10, 0.22), transparent 36%),
          linear-gradient(180deg, #f7f1e6 0%, #efe6d5 100%);
        color: #1d1b16;
      }

      main {
        width: min(760px, calc(100vw - 32px));
        padding: 32px;
        border: 1px solid rgba(29, 27, 22, 0.08);
        border-radius: 24px;
        background: rgba(255, 252, 245, 0.92);
        box-shadow: 0 20px 60px rgba(29, 27, 22, 0.12);
      }

      h1 {
        margin-top: 0;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      p {
        line-height: 1.6;
      }

      code {
        padding: 2px 6px;
        border-radius: 8px;
        background: #efe7d8;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
      }

      .button-primary {
        background: #1d1b16;
        color: white;
      }

      .button-secondary {
        background: #efe7d8;
        color: #1d1b16;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ffocr</h1>
      <p>This GitHub Pages site hosts the browser demo and the default PP-OCRv5 model files.</p>
      <p>Model base URL: <code>/models/pp-ocrv5</code></p>
      <div class="actions">
        <a class="button button-primary" href="./demo/">Open Demo</a>
        <a class="button button-secondary" href="./models/pp-ocrv5/">Open Model Path</a>
      </div>
    </main>
  </body>
</html>
